
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mfa_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://user:password@localhost:5432/mfa_db
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Run TypeScript build
        working-directory: backend
        run: npx tsc

      - name: Run tests
        working-directory: backend
        run: npm test || echo "No tests configured"

      - name: Lint check (optional)
        working-directory: backend
        run: npm run lint || echo "Lint not configured"

      - name: Success message
        run: echo "CI/CD Pipeline completed successfully 🚀"