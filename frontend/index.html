<!DOCTYPE html>
<html>
<body>

<h2>Register</h2>
<input id="regEmail" placeholder="Email"><br><br>
<input id="regPassword" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginPassword" type="password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h2>OTP</h2>
<input id="otp"><br><br>
<button onclick="verify()">Verify</button>

<p id="result"></p>

<script>
let currentEmail = "";

async function register() {
  const email = regEmail.value;
  const password = regPassword.value;

  const res = await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  result.innerText = (await res.json()).message;
}

async function login() {
  const email = loginEmail.value;
  const password = loginPassword.value;

  currentEmail = email;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  result.innerText = (await res.json()).message;
}

async function verify() {
  const otp = document.getElementById("otp").value;

  const res = await fetch("http://localhost:3000/verify-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email: currentEmail, token: otp })
  });

  result.innerText = (await res.json()).message;
}
</script>

</body>
</html>
